name: Deploy Node.js App to VM

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Optional but highly recommended: Build and push to Docker Hub/GHCR here instead of on the VM.
      # For now, we will fix your exact VM script strategy below.

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            # 1. Define variables for cleanliness
            REPO_DIR="nodejs-application"
            IMAGE_NAME="nodejs-app"
            CONTAINER_NAME="nodejs-app-container"

            echo "========================================="
            echo "1. Preparing Repository..."
            echo "========================================="
            if [ -d "$REPO_DIR" ]; then
              echo "Old repository directory found. Cleaning up safely..."
              rm -rf "$REPO_DIR"
            fi

            echo "Cloning repository..."
            git clone https://github.com/perfectdash/nodejs-application.git "$REPO_DIR"
            cd "$REPO_DIR"

            echo "========================================="
            echo "2. Building Docker Image..."
            echo "========================================="
            # Using lowercase 'Dockerfile' as it's standard, change if your file is explicitly 'DockerFile'
            docker build -f DockerFile -t "$IMAGE_NAME:latest" .

            echo "========================================="
            echo "3. Safely Transitioning Containers..."
            echo "========================================="
            # Stop and remove the old container only AFTER a successful build
            if [ "$(docker ps -aq -f name=^${CONTAINER_NAME}$)" ]; then
              echo "Stopping and removing existing container: $CONTAINER_NAME"
              docker stop "$CONTAINER_NAME"
              docker rm "$CONTAINER_NAME"
            fi

            echo "Starting new container..."
            docker run -d \
              -p 3000:3000 \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              "$IMAGE_NAME:latest"

            echo "========================================="
            echo "4. Post-Deployment Cleanup..."
            echo "========================================="
            cd ..
            rm -rf "$REPO_DIR"
            
            # Prune dangling images to save disk space on the VM
            docker image prune -f
            
            echo "Deployment successfully completed!"


            

