name: Deploy Node.js App to VM

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            if [ -d "nodejs-application" ]; then
              echo "Repository already exists. Removing..."
              rm -rf nodejs-application
            fi

            echo "================================"
            echo "Preparing repository..."
            echo "================================"

            echo "Cloning repository..."
            git clone https://github.com/perfectdash/nodejs-application.git

            cd nodejs-application

            echo "================================"
            echo "Building Docker image..."
            echo "================================"
            
            docker build -f DockerFile -t nodejs-app .
            
            
            echo "================================"
            echo "Cleanup complete!"
            echo "================================"

            rm -rf nodejs-application 

            docker stop nodejs-app-container || true
            docker rm nodejs-app-container || true

            echo "================================"
            echo "Running Docker container..."
            echo "================================"

            docker run -d -p 3000:3000 --name nodejs-app-container nodejs-app


            


            

